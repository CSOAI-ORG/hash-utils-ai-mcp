name: hash-utils-ai-mcp
description: Text hashing, hash verification, UUID generation, and nanoid creation.
version: 1.0.0
tools:
- name: hash_text
  description: Hash text using various algorithms.
  parameters:
  - name: text
    type: string
    required: true
  - name: algorithm
    type: string
    required: false
  - name: encoding
    type: string
    required: false
- name: verify_hash
  description: Verify if a text matches an expected hash.
  parameters:
  - name: text
    type: string
    required: true
  - name: expected_hash
    type: string
    required: true
  - name: algorithm
    type: string
    required: false
- name: generate_uuid
  description: Generate UUID(s) of various versions.
  parameters:
  - name: version
    type: integer
    required: false
  - name: count
    type: integer
    required: false
  - name: namespace
    type: string
    required: false
  - name: name
    type: string
    required: false
- name: generate_nanoid
  description: Generate nanoid-style short unique identifiers.
  parameters:
  - name: size
    type: integer
    required: false
  - name: alphabet
    type: string
    required: false
  - name: count
    type: integer
    required: false
